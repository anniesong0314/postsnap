<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PostSnap — 순간을 글로</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --accent: #c8602a;
    --accent-light: #f0d5c4;
    --muted: #7a7068;
    --white: #fdfcfa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1.5px solid var(--cream);
    background: var(--white);
  }

  .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 1.6rem;
    color: var(--ink);
    letter-spacing: -0.02em;
  }

  .logo span { color: var(--accent); font-style: italic; }

  .tagline {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* MAIN LAYOUT */
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
  }

  @media (max-width: 700px) {
    main { grid-template-columns: 1fr; padding: 24px 16px; }
    header { padding: 16px 20px; }
  }

  /* PANEL */
  .panel {
    background: var(--white);
    border-radius: 16px;
    border: 1.5px solid var(--cream);
    overflow: hidden;
  }

  .panel-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--cream);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .step-badge {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-size: 0.75rem;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .panel-title {
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink);
  }

  .panel-body { padding: 24px; }

  /* UPLOAD ZONE */
  .upload-zone {
    border: 2px dashed var(--cream);
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
  }

  .upload-zone:hover {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .upload-zone.has-preview {
    border-style: solid;
    border-color: var(--accent);
    padding: 0;
  }

  .upload-zone input[type="file"] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .upload-icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
    display: block;
  }

  .upload-text {
    font-size: 0.9rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .upload-text strong { color: var(--accent); }

  #preview-img {
    width: 100%;
    max-height: 200px;
    object-fit: cover;
    border-radius: 10px;
    display: none;
  }

  /* CONTEXT INPUT */
  .context-label {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: block;
  }

  textarea {
    width: 100%;
    border: 1.5px solid var(--cream);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    background: var(--paper);
    resize: none;
    line-height: 1.6;
    transition: border-color 0.2s;
    outline: none;
  }

  textarea:focus { border-color: var(--accent); }

  /* TONE SELECTOR */
  .tone-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 16px;
  }

  .tone-btn {
    padding: 10px 12px;
    border: 1.5px solid var(--cream);
    border-radius: 8px;
    background: var(--paper);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }

  .tone-btn:hover { border-color: var(--accent); color: var(--accent); }

  .tone-btn.active {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 600;
  }

  .tone-emoji { margin-right: 6px; }

  /* GENERATE BUTTON */
  .generate-btn {
    width: 100%;
    margin-top: 20px;
    padding: 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.01em;
  }

  .generate-btn:hover { background: #a84d20; transform: translateY(-1px); }
  .generate-btn:active { transform: translateY(0); }
  .generate-btn:disabled { background: var(--muted); cursor: not-allowed; transform: none; }

  /* OUTPUT PANEL — spans full width */
  .output-panel {
    grid-column: 1 / -1;
    background: var(--white);
    border: 1.5px solid var(--cream);
    border-radius: 16px;
    overflow: hidden;
  }

  /* TABS */
  .tab-bar {
    display: flex;
    border-bottom: 1.5px solid var(--cream);
    background: var(--paper);
  }

  .tab {
    padding: 14px 24px;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2.5px solid transparent;
    transition: all 0.15s;
  }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: var(--white);
  }

  .tab-content { display: none; padding: 28px; }
  .tab-content.active { display: block; }

  /* GENERATED TEXT */
  .generated-text {
    font-size: 0.92rem;
    line-height: 1.8;
    color: var(--ink);
    white-space: pre-wrap;
    min-height: 120px;
  }

  .placeholder-text {
    color: var(--muted);
    font-style: italic;
    font-size: 0.88rem;
    text-align: center;
    padding: 40px 20px;
  }

  /* COPY BUTTON */
  .copy-btn {
    margin-top: 20px;
    padding: 10px 20px;
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    background: transparent;
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .copy-btn:hover { background: var(--accent); color: #fff; }

  /* LOADING SPINNER */
  .loading {
    display: none;
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--cream);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* PROGRESS BAR */
  .progress-bar {
    height: 3px;
    background: var(--cream);
    border-radius: 2px;
    margin-top: 12px;
    overflow: hidden;
    display: none;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s ease;
  }

  /* API KEY input */
  .api-notice {
    background: var(--accent-light);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.82rem;
    color: var(--accent);
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .api-key-input {
    width: 100%;
    border: 1.5px solid var(--cream);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    background: var(--paper);
    color: var(--ink);
    outline: none;
    margin-bottom: 4px;
    transition: border-color 0.2s;
  }
  .api-key-input:focus { border-color: var(--accent); }

  /* CHARACTER COUNT */
  .char-count {
    font-size: 0.75rem;
    color: var(--muted);
    text-align: right;
    margin-top: 4px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Post<span>Snap</span></div>
  <div class="tagline">순간을 글로 — 완벽하지 않아도 괜찮아요</div>
</header>

<main>

  <!-- PANEL 1: Upload -->
  <div class="panel">
    <div class="panel-header">
      <div class="step-badge">1</div>
      <div class="panel-title">사진 / 메모 업로드</div>
    </div>
    <div class="panel-body">
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/*">
        <span class="upload-icon">📷</span>
        <div class="upload-text">
          <strong>클릭해서 사진 선택</strong><br>
          또는 여기로 드래그
        </div>
        <img id="preview-img" alt="미리보기">
      </div>

      <div style="margin-top: 20px;">
        <span class="context-label">어떤 순간이었나요? (선택)</span>
        <textarea id="contextInput" rows="3"
          placeholder="예: 제주도 여행 중 우연히 발견한 카페. 창밖으로 바다가 보이고 커피가 정말 맛있었다."></textarea>
        <div class="char-count"><span id="charCount">0</span> / 300자</div>
      </div>
    </div>
  </div>

  <!-- PANEL 2: Options -->
  <div class="panel">
    <div class="panel-header">
      <div class="step-badge">2</div>
      <div class="panel-title">톤 & 스타일 선택</div>
    </div>
    <div class="panel-body">

      <span class="context-label">어디에 올릴까요?</span>
      <div class="tone-grid">
        <button class="tone-btn active" data-platform="blog">
          <span class="tone-emoji">📝</span>블로그 포스트
        </button>
        <button class="tone-btn" data-platform="linkedin">
          <span class="tone-emoji">💼</span>링크드인
        </button>
        <button class="tone-btn" data-platform="both">
          <span class="tone-emoji">✨</span>둘 다 만들기
        </button>
        <button class="tone-btn" data-platform="instagram">
          <span class="tone-emoji">📸</span>인스타그램
        </button>
      </div>

      <div style="margin-top: 20px;">
        <span class="context-label">글의 분위기</span>
        <div class="tone-grid">
          <button class="tone-btn active" data-tone="warm">
            <span class="tone-emoji">☀️</span>따뜻하고 감성적
          </button>
          <button class="tone-btn" data-tone="professional">
            <span class="tone-emoji">🎯</span>전문적·인사이트
          </button>
          <button class="tone-btn" data-tone="story">
            <span class="tone-emoji">📖</span>이야기체·일상
          </button>
          <button class="tone-btn" data-tone="short">
            <span class="tone-emoji">⚡</span>짧고 임팩트
          </button>
        </div>
      </div>

      <button class="generate-btn" id="generateBtn" onclick="generatePost()">
        ✦ 포스트 자동 생성하기
      </button>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

    </div>
  </div>

  <!-- OUTPUT PANEL -->
  <div class="output-panel">
    <div class="panel-header" style="background: var(--white);">
      <div class="step-badge">3</div>
      <div class="panel-title">생성된 포스트</div>
    </div>

    <div class="tab-bar" id="tabBar" style="display:none;">
      <div class="tab active" data-tab="blog" onclick="switchTab('blog')">📝 블로그</div>
      <div class="tab" data-tab="linkedin" onclick="switchTab('linkedin')">💼 링크드인</div>
      <div class="tab" data-tab="instagram" onclick="switchTab('instagram')">📸 인스타그램</div>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      AI가 글을 쓰고 있어요... 잠깐만요 ✍️
    </div>

    <div id="outputArea">
      <div class="tab-content active" id="tab-blog">
        <div class="placeholder-text">
          ① 사진이나 메모를 올리고<br>② 스타일을 골라서<br>③ 버튼을 눌러보세요 🪄
        </div>
      </div>
      <div class="tab-content" id="tab-linkedin"></div>
      <div class="tab-content" id="tab-instagram"></div>
    </div>

  </div>

</main>

<script>
  // ── STATE ──────────────────────────────────────────────
  let selectedPlatform = 'blog';
  let selectedTone = 'warm';
  let uploadedImageBase64 = null;

  // ── FILE UPLOAD ────────────────────────────────────────
  const fileInput = document.getElementById('fileInput');
  const previewImg = document.getElementById('preview-img');
  const uploadZone = document.getElementById('uploadZone');

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      uploadedImageBase64 = ev.target.result.split(',')[1];
      previewImg.src = ev.target.result;
      previewImg.style.display = 'block';
      uploadZone.querySelector('.upload-icon').style.display = 'none';
      uploadZone.querySelector('.upload-text').style.display = 'none';
      uploadZone.classList.add('has-preview');
    };
    reader.readAsDataURL(file);
  });

  // Drag & Drop
  uploadZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadZone.style.borderColor = 'var(--accent)';
  });
  uploadZone.addEventListener('dragleave', () => {
    uploadZone.style.borderColor = '';
  });
  uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      fileInput.files = e.dataTransfer.files;
      fileInput.dispatchEvent(new Event('change'));
    }
  });

  // ── CHARACTER COUNT ────────────────────────────────────
  const contextInput = document.getElementById('contextInput');
  const charCount = document.getElementById('charCount');
  contextInput.addEventListener('input', () => {
    charCount.textContent = contextInput.value.length;
  });

  // ── PLATFORM BUTTONS ───────────────────────────────────
  document.querySelectorAll('[data-platform]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-platform]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedPlatform = btn.dataset.platform;
    });
  });

  // ── TONE BUTTONS ───────────────────────────────────────
  document.querySelectorAll('[data-tone]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-tone]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedTone = btn.dataset.tone;
    });
  });

  // ── TAB SWITCH ─────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelector(`[data-tab="${tab}"]`)?.classList.add('active');
    document.getElementById(`tab-${tab}`)?.classList.add('active');
  }

  // ── COPY ───────────────────────────────────────────────
  function copyText(id) {
    const el = document.getElementById(id);
    const text = el?.innerText || '';
    navigator.clipboard.writeText(text).then(() => {
      const btn = el?.nextElementSibling;
      if (btn) { btn.textContent = '✓ 복사됨!'; setTimeout(() => btn.textContent = '📋 복사하기', 2000); }
    });
  }

  // ── PROGRESS ANIMATION ─────────────────────────────────
  function animateProgress() {
    const bar = document.getElementById('progressBar');
    const fill = document.getElementById('progressFill');
    bar.style.display = 'block';
    fill.style.width = '0%';
    let p = 0;
    const interval = setInterval(() => {
      p += Math.random() * 15;
      if (p > 90) p = 90;
      fill.style.width = p + '%';
    }, 400);
    return { interval, fill };
  }

  // ── BUILD PROMPT ───────────────────────────────────────
  function buildPrompt() {
    const context = contextInput.value.trim();
    const toneMap = {
      warm: '따뜻하고 감성적인 톤으로',
      professional: '전문적이고 인사이트를 담아',
      story: '일상 이야기를 풀어가는 스토리텔링 방식으로',
      short: '짧고 강렬하게, 핵심만'
    };
    const toneDesc = toneMap[selectedTone] || '자연스럽게';

    const platforms = selectedPlatform === 'both'
      ? ['blog', 'linkedin']
      : selectedPlatform === 'instagram'
      ? ['instagram']
      : [selectedPlatform];

    let prompt = `당신은 SNS 포스트 작성 전문가입니다. ${toneDesc} 글을 써주세요.\n\n`;
    if (context) prompt += `상황/메모: ${context}\n\n`;
    if (uploadedImageBase64) prompt += `(사진이 첨부되어 있습니다. 사진의 분위기와 내용을 글에 반영해주세요.)\n\n`;

    prompt += `다음 플랫폼에 맞는 포스트를 작성해주세요:\n`;

    platforms.forEach(p => {
      if (p === 'blog') prompt += `\n[BLOG]\n블로그 포스트 (300~500자, 제목 포함, 소제목 활용, 독자가 끝까지 읽고 싶게)\n`;
      if (p === 'linkedin') prompt += `\n[LINKEDIN]\n링크드인 포스트 (200~350자, 인사이트나 배움 강조, 마지막에 짧은 질문으로 마무리)\n`;
      if (p === 'instagram') prompt += `\n[INSTAGRAM]\n인스타그램 캡션 (100~200자, 감성적, 해시태그 5개 포함)\n`;
    });

    prompt += `\n각 섹션은 [BLOG], [LINKEDIN], [INSTAGRAM] 태그로 구분해주세요. 완벽하지 않아도 괜찮으니 자연스럽게 써주세요.`;
    return { prompt, platforms };
  }

  // ── RENDER OUTPUT ──────────────────────────────────────
  function renderOutput(text, platforms) {
    const tabBar = document.getElementById('tabBar');
    const sections = { blog: '', linkedin: '', instagram: '' };

    // Parse sections
    const blogMatch = text.match(/\[BLOG\]([\s\S]*?)(?=\[LINKEDIN\]|\[INSTAGRAM\]|$)/);
    const linkedinMatch = text.match(/\[LINKEDIN\]([\s\S]*?)(?=\[BLOG\]|\[INSTAGRAM\]|$)/);
    const instaMatch = text.match(/\[INSTAGRAM\]([\s\S]*?)(?=\[BLOG\]|\[LINKEDIN\]|$)/);

    if (blogMatch) sections.blog = blogMatch[1].trim();
    if (linkedinMatch) sections.linkedin = linkedinMatch[1].trim();
    if (instaMatch) sections.instagram = instaMatch[1].trim();

    // If no tags found, put everything in the primary platform
    if (!blogMatch && !linkedinMatch && !instaMatch) {
      sections[platforms[0]] = text.trim();
    }

    // Show tabs
    const hasTabs = platforms.length > 1 || selectedPlatform === 'both';
    tabBar.style.display = hasTabs ? 'flex' : 'none';

    // Populate tabs
    platforms.forEach((p, i) => {
      const el = document.getElementById(`tab-${p}`);
      if (el) {
        el.innerHTML = `
          <div class="generated-text" id="text-${p}">${sections[p] || text.trim()}</div>
          <button class="copy-btn" onclick="copyText('text-${p}')">📋 복사하기</button>
        `;
      }
    });

    switchTab(platforms[0]);
  }

  // ── MAIN GENERATE ──────────────────────────────────────
  async function generatePost() {
    const btn = document.getElementById('generateBtn');
    const loading = document.getElementById('loading');
    const outputArea = document.getElementById('outputArea');

    if (!contextInput.value.trim() && !uploadedImageBase64) {
      alert('사진을 올리거나 메모를 입력해주세요 😊');
      return;
    }

    btn.disabled = true;
    btn.textContent = '생성 중...';
    loading.style.display = 'block';
    outputArea.style.display = 'none';
    document.getElementById('tabBar').style.display = 'none';

    const { prompt, platforms } = buildPrompt();
    const { interval, fill } = animateProgress();

    try {
      const messages = [];

      if (uploadedImageBase64) {
        messages.push({
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: uploadedImageBase64 } },
            { type: 'text', text: prompt }
          ]
        });
      } else {
        messages.push({ role: 'user', content: prompt });
      }

      const response = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages
        })
      });

      const data = await response.json();
      const text = data.content?.map(i => i.text || '').join('\n') || '';

      clearInterval(interval);
      fill.style.width = '100%';

      setTimeout(() => {
        loading.style.display = 'none';
        outputArea.style.display = 'block';
        document.getElementById('progressBar').style.display = 'none';
        renderOutput(text, platforms);
      }, 400);

    } catch (err) {
      clearInterval(interval);
      loading.style.display = 'none';
      outputArea.style.display = 'block';
      document.getElementById('progressBar').style.display = 'none';
      document.getElementById('tab-blog').innerHTML = `
        <div class="generated-text">❌ 오류가 발생했어요: ${err.message}</div>
      `;
      document.getElementById('tab-blog').classList.add('active');
    }

    btn.disabled = false;
    btn.textContent = '✦ 포스트 자동 생성하기';
  }
</script>
</body>
</html>
