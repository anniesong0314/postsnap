<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FrameSnap — 나만의 콜라주</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Libre+Franklin:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #181818;
    --border: #2a2a2a;
    --accent: #e8c97a;
    --accent2: #c87941;
    --text: #f0ece4;
    --muted: #6b6560;
    --white: #fdfcfa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Libre Franklin', sans-serif;
    min-height: 100vh;
  }

  header {
    padding: 20px 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    letter-spacing: -0.01em;
  }
  .logo span { color: var(--accent); font-style: italic; }
  .tagline { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 36px 24px;
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 28px;
    align-items: start;
  }

  @media (max-width: 800px) {
    .container { grid-template-columns: 1fr; }
    header { padding: 16px 20px; }
  }

  /* LEFT PANEL */
  .left-panel { display: flex; flex-direction: column; gap: 16px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-num {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--accent);
    color: #0e0e0e;
    font-size: 0.72rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .card-title {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text);
  }
  .card-body { padding: 18px; }

  /* UPLOAD */
  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 10px;
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .upload-zone:hover { border-color: var(--accent); background: rgba(232,201,122,0.04); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 2rem; margin-bottom: 8px; display: block; }
  .upload-text { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }
  .upload-text strong { color: var(--accent); }

  /* PHOTO THUMBNAILS */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 14px;
  }
  .thumb {
    aspect-ratio: 1;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    background: var(--border);
    cursor: pointer;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb .remove {
    position: absolute; top: 4px; right: 4px;
    width: 20px; height: 20px;
    background: rgba(0,0,0,0.7);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; color: #fff;
    opacity: 0; transition: opacity 0.15s;
    cursor: pointer; border: none;
  }
  .thumb:hover .remove { opacity: 1; }
  .photo-count { font-size: 0.75rem; color: var(--muted); margin-top: 8px; text-align: right; }

  /* LAYOUT SELECTOR */
  .layout-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .layout-btn {
    aspect-ratio: 1;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    padding: 8px;
  }
  .layout-btn:hover { border-color: var(--accent); }
  .layout-btn.active { border-color: var(--accent); background: rgba(232,201,122,0.08); }
  .layout-preview { width: 100%; height: 100%; display: grid; gap: 3px; }

  /* Layout previews */
  .lp-1 { grid-template-columns: 1fr; }
  .lp-2h { grid-template-columns: 1fr 1fr; }
  .lp-2v { grid-template-rows: 1fr 1fr; }
  .lp-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .lp-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .lp-feature { grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr; }

  .lp-cell {
    background: var(--muted);
    border-radius: 3px;
    opacity: 0.5;
  }
  .lp-cell.span2 { grid-row: span 2; opacity: 0.7; }

  /* GAP SELECTOR */
  .gap-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
  .gap-btn {
    flex: 1; padding: 7px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--muted);
    font-size: 0.75rem;
    font-family: 'Libre Franklin', sans-serif;
    cursor: pointer; transition: all 0.15s;
    text-align: center;
  }
  .gap-btn.active { border-color: var(--accent); color: var(--accent); }

  /* BG COLOR */
  .bg-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .bg-swatch {
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.15s;
  }
  .bg-swatch.active { border-color: var(--accent); transform: scale(1.15); }

  /* RATIO */
  .ratio-row { display: flex; gap: 8px; margin-top: 10px; }
  .ratio-btn {
    flex: 1; padding: 7px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--muted);
    font-size: 0.75rem;
    font-family: 'Libre Franklin', sans-serif;
    cursor: pointer; transition: all 0.15s;
    text-align: center;
  }
  .ratio-btn.active { border-color: var(--accent); color: var(--accent); }

  /* GENERATE BTN */
  .gen-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #0e0e0e;
    border: none;
    border-radius: 10px;
    font-family: 'Libre Franklin', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .gen-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,201,122,0.3); }
  .gen-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  /* RIGHT PANEL — CANVAS */
  .canvas-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .canvas-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .canvas-title {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .download-btn {
    padding: 7px 16px;
    background: transparent;
    border: 1.5px solid var(--accent);
    border-radius: 7px;
    color: var(--accent);
    font-size: 0.78rem;
    font-weight: 600;
    font-family: 'Libre Franklin', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    display: none;
  }
  .download-btn:hover { background: var(--accent); color: #0e0e0e; }
  .download-btn.visible { display: block; }

  .canvas-body { padding: 24px; display: flex; align-items: center; justify-content: center; min-height: 500px; }

  #collageCanvas {
    max-width: 100%;
    border-radius: 8px;
    display: none;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }

  .canvas-placeholder {
    text-align: center;
    color: var(--muted);
  }
  .canvas-placeholder .ph-icon { font-size: 3rem; margin-bottom: 12px; display: block; opacity: 0.4; }
  .canvas-placeholder p { font-size: 0.85rem; line-height: 1.7; }

  /* POSTSNAP LINK */
  .postsnap-btn {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Libre Franklin', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: none;
  }
  .postsnap-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .postsnap-btn.visible { display: block; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Frame<span>Snap</span></div>
  </div>
  <div class="tagline">사진 여러 장 → 콜라주 한 장</div>
</header>

<div class="container">

  <!-- LEFT -->
  <div class="left-panel">

    <!-- UPLOAD -->
    <div class="card">
      <div class="card-header">
        <div class="card-num">1</div>
        <div class="card-title">사진 올리기</div>
      </div>
      <div class="card-body">
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" accept="image/*" multiple>
          <span class="upload-icon">🖼️</span>
          <div class="upload-text">
            <strong>클릭 또는 드래그</strong><br>
            여러 장 한번에 선택 가능
          </div>
        </div>
        <div class="photo-grid" id="photoGrid"></div>
        <div class="photo-count" id="photoCount"></div>
      </div>
    </div>

    <!-- LAYOUT -->
    <div class="card">
      <div class="card-header">
        <div class="card-num">2</div>
        <div class="card-title">레이아웃</div>
      </div>
      <div class="card-body">
        <div class="layout-grid">
          <button class="layout-btn active" data-layout="2h" onclick="selectLayout(this)">
            <div class="layout-preview lp-2h">
              <div class="lp-cell"></div><div class="lp-cell"></div>
            </div>
          </button>
          <button class="layout-btn" data-layout="2v" onclick="selectLayout(this)">
            <div class="layout-preview lp-2v">
              <div class="lp-cell"></div><div class="lp-cell"></div>
            </div>
          </button>
          <button class="layout-btn" data-layout="3" onclick="selectLayout(this)">
            <div class="layout-preview" style="grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:3px">
              <div class="lp-cell" style="grid-column:span 2"></div>
              <div class="lp-cell"></div><div class="lp-cell"></div>
            </div>
          </button>
          <button class="layout-btn" data-layout="4" onclick="selectLayout(this)">
            <div class="layout-preview lp-4">
              <div class="lp-cell"></div><div class="lp-cell"></div>
              <div class="lp-cell"></div><div class="lp-cell"></div>
            </div>
          </button>
          <button class="layout-btn" data-layout="feature" onclick="selectLayout(this)">
            <div class="layout-preview lp-feature" style="gap:3px">
              <div class="lp-cell span2"></div>
              <div class="lp-cell"></div><div class="lp-cell"></div>
            </div>
          </button>
          <button class="layout-btn" data-layout="strip" onclick="selectLayout(this)">
            <div class="layout-preview" style="grid-template-columns:1fr 1fr 1fr;gap:3px">
              <div class="lp-cell"></div><div class="lp-cell"></div><div class="lp-cell"></div>
            </div>
          </button>
        </div>

        <!-- GAP -->
        <div style="margin-top:14px;">
          <div style="font-size:0.72rem;color:var(--muted);margin-bottom:6px;letter-spacing:0.05em;text-transform:uppercase">여백</div>
          <div class="gap-row">
            <button class="gap-btn active" data-gap="0" onclick="selectGap(this)">없음</button>
            <button class="gap-btn" data-gap="8" onclick="selectGap(this)">좁게</button>
            <button class="gap-btn" data-gap="16" onclick="selectGap(this)">보통</button>
            <button class="gap-btn" data-gap="28" onclick="selectGap(this)">넓게</button>
          </div>
        </div>

        <!-- BG -->
        <div style="margin-top:14px;">
          <div style="font-size:0.72rem;color:var(--muted);margin-bottom:8px;letter-spacing:0.05em;text-transform:uppercase">배경색</div>
          <div class="bg-row">
            <div class="bg-swatch active" style="background:#ffffff" data-bg="#ffffff" onclick="selectBg(this)"></div>
            <div class="bg-swatch" style="background:#0e0e0e;border-color:#444" data-bg="#0e0e0e" onclick="selectBg(this)"></div>
            <div class="bg-swatch" style="background:#f5f0e8" data-bg="#f5f0e8" onclick="selectBg(this)"></div>
            <div class="bg-swatch" style="background:#e8c97a" data-bg="#e8c97a" onclick="selectBg(this)"></div>
            <div class="bg-swatch" style="background:#c8602a" data-bg="#c8602a" onclick="selectBg(this)"></div>
            <div class="bg-swatch" style="background:#2d4a3e" data-bg="#2d4a3e" onclick="selectBg(this)"></div>
          </div>
        </div>

        <!-- RATIO -->
        <div style="margin-top:14px;">
          <div style="font-size:0.72rem;color:var(--muted);margin-bottom:6px;letter-spacing:0.05em;text-transform:uppercase">비율</div>
          <div class="ratio-row">
            <button class="ratio-btn active" data-ratio="1:1" onclick="selectRatio(this)">1:1</button>
            <button class="ratio-btn" data-ratio="4:5" onclick="selectRatio(this)">4:5</button>
            <button class="ratio-btn" data-ratio="16:9" onclick="selectRatio(this)">16:9</button>
            <button class="ratio-btn" data-ratio="3:4" onclick="selectRatio(this)">3:4</button>
          </div>
        </div>
      </div>
    </div>

    <!-- GENERATE -->
    <button class="gen-btn" id="genBtn" onclick="generateCollage()">✦ 콜라주 만들기</button>
    <button class="postsnap-btn" id="postsnapBtn" onclick="goToPostSnap()">
      📝 PostSnap에서 글 만들기 →
    </button>

  </div>

  <!-- RIGHT -->
  <div class="canvas-wrap">
    <div class="canvas-header">
      <div class="canvas-title">미리보기</div>
      <button class="download-btn" id="downloadBtn" onclick="downloadCollage()">⬇ 저장하기</button>
    </div>
    <div class="canvas-body">
      <div class="canvas-placeholder" id="placeholder">
        <span class="ph-icon">🖼️</span>
        <p>사진을 올리고<br>레이아웃을 골라서<br>콜라주를 만들어보세요</p>
      </div>
      <canvas id="collageCanvas"></canvas>
    </div>
  </div>

</div>

<script>
  let photos = [];
  let selectedLayout = '2h';
  let selectedGap = 0;
  let selectedBg = '#ffffff';
  let selectedRatio = '1:1';
  let collageDataUrl = null;

  // ── UPLOAD ──────────────────────────────────────────
  const fileInput = document.getElementById('fileInput');

  fileInput.addEventListener('change', (e) => {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          photos.push({ src: ev.target.result, img });
          renderThumbs();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });
    fileInput.value = '';
  });

  // Drag & Drop
  const uploadZone = document.getElementById('uploadZone');
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.style.borderColor = 'var(--accent)'; });
  uploadZone.addEventListener('dragleave', () => { uploadZone.style.borderColor = ''; });
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.style.borderColor = '';
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => { photos.push({ src: ev.target.result, img }); renderThumbs(); };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });
  });

  function renderThumbs() {
    const grid = document.getElementById('photoGrid');
    const count = document.getElementById('photoCount');
    grid.innerHTML = photos.map((p, i) => `
      <div class="thumb">
        <img src="${p.src}">
        <button class="remove" onclick="removePhoto(${i})">✕</button>
      </div>
    `).join('');
    count.textContent = photos.length > 0 ? `${photos.length}장 선택됨` : '';
  }

  function removePhoto(i) {
    photos.splice(i, 1);
    renderThumbs();
  }

  // ── SELECTORS ────────────────────────────────────────
  function selectLayout(btn) {
    document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedLayout = btn.dataset.layout;
  }

  function selectGap(btn) {
    document.querySelectorAll('.gap-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedGap = parseInt(btn.dataset.gap);
  }

  function selectBg(el) {
    document.querySelectorAll('.bg-swatch').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    selectedBg = el.dataset.bg;
  }

  function selectRatio(btn) {
    document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedRatio = btn.dataset.ratio;
  }

  // ── CANVAS SIZE ──────────────────────────────────────
  function getCanvasSize() {
    const base = 1080;
    const ratios = { '1:1': [1,1], '4:5': [4,5], '16:9': [16,9], '3:4': [3,4] };
    const [w, h] = ratios[selectedRatio] || [1,1];
    return { width: base * w / Math.max(w,h), height: base * h / Math.max(w,h) };
  }

  // ── DRAW COLLAGE ─────────────────────────────────────
  function generateCollage() {
    if (photos.length === 0) { alert('사진을 먼저 올려주세요 😊'); return; }

    const canvas = document.getElementById('collageCanvas');
    const ctx = canvas.getContext('2d');
    const { width, height } = getCanvasSize();
    const gap = selectedGap;
    const pad = gap > 0 ? gap : 0;

    canvas.width = width;
    canvas.height = height;

    // Fill bg
    ctx.fillStyle = selectedBg;
    ctx.fillRect(0, 0, width, height);

    const p = photos;
    const slots = getSlots(width, height, gap, pad);

    slots.forEach((slot, i) => {
      const photo = p[i % p.length];
      drawCropped(ctx, photo.img, slot.x, slot.y, slot.w, slot.h);
    });

    // Rounded canvas corners
    collageDataUrl = canvas.toDataURL('image/jpeg', 0.95);

    document.getElementById('placeholder').style.display = 'none';
    canvas.style.display = 'block';
    document.getElementById('downloadBtn').classList.add('visible');
    document.getElementById('postsnapBtn').classList.add('visible');
  }

  function getSlots(W, H, gap, pad) {
    const g = gap;
    switch (selectedLayout) {
      case '2h': return [
        { x: pad, y: pad, w: (W-3*pad-g)/2, h: H-2*pad },
        { x: pad+(W-3*pad-g)/2+g+pad, y: pad, w: (W-3*pad-g)/2, h: H-2*pad }
      ];
      case '2v': return [
        { x: pad, y: pad, w: W-2*pad, h: (H-3*pad-g)/2 },
        { x: pad, y: pad+(H-3*pad-g)/2+g+pad, w: W-2*pad, h: (H-3*pad-g)/2 }
      ];
      case '3': {
        const topH = (H-3*pad-g)*0.55;
        const botH = H-3*pad-g-topH;
        const botW = (W-3*pad-g)/2;
        return [
          { x: pad, y: pad, w: W-2*pad, h: topH },
          { x: pad, y: pad+topH+g, w: botW, h: botH },
          { x: pad+botW+g, y: pad+topH+g, w: botW, h: botH }
        ];
      }
      case '4': {
        const hw = (W-3*pad-g)/2;
        const hh = (H-3*pad-g)/2;
        return [
          { x: pad, y: pad, w: hw, h: hh },
          { x: pad+hw+g, y: pad, w: hw, h: hh },
          { x: pad, y: pad+hh+g, w: hw, h: hh },
          { x: pad+hw+g, y: pad+hh+g, w: hw, h: hh }
        ];
      }
      case 'feature': {
        const fw = (W-3*pad-g)*0.6;
        const sw = W-3*pad-g-fw;
        const sh = (H-3*pad-g)/2;
        return [
          { x: pad, y: pad, w: fw, h: H-2*pad },
          { x: pad+fw+g, y: pad, w: sw, h: sh },
          { x: pad+fw+g, y: pad+sh+g, w: sw, h: sh }
        ];
      }
      case 'strip': {
        const sw = (W-4*pad-2*g)/3;
        return [
          { x: pad, y: pad, w: sw, h: H-2*pad },
          { x: pad+sw+g, y: pad, w: sw, h: H-2*pad },
          { x: pad+2*(sw+g), y: pad, w: sw, h: H-2*pad }
        ];
      }
      default: return [{ x: pad, y: pad, w: W-2*pad, h: H-2*pad }];
    }
  }

  function drawCropped(ctx, img, x, y, w, h) {
    const imgAR = img.width / img.height;
    const slotAR = w / h;
    let sx, sy, sw, sh;
    if (imgAR > slotAR) {
      sh = img.height; sw = sh * slotAR;
      sx = (img.width - sw) / 2; sy = 0;
    } else {
      sw = img.width; sh = sw / slotAR;
      sx = 0; sy = (img.height - sh) / 2;
    }
    ctx.save();
    ctx.beginPath();
    ctx.rect(x, y, w, h);
    ctx.clip();
    ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
    ctx.restore();
  }

  // ── DOWNLOAD ─────────────────────────────────────────
  function downloadCollage() {
    if (!collageDataUrl) return;
    const a = document.createElement('a');
    a.href = collageDataUrl;
    a.download = `framesnap-${Date.now()}.jpg`;
    a.click();
  }

  // ── POSTSNAP LINK ─────────────────────────────────────
  function goToPostSnap() {
    window.open('https://postsnap.vercel.app', '_blank');
  }
</script>
